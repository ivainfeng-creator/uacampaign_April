<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIVERSE New User Challenge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: #0a0a0f; font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; color: #fff; }
    h1, h2, h3 { font-family: 'Rajdhani', sans-serif; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #0a0a0f; }
    ::-webkit-scrollbar-thumb { background: #7c6aff; border-radius: 3px; }

    /* ── Grid background ── */
    .grid-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(124,106,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,106,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridDrift 30s linear infinite;
    }
    @keyframes gridDrift {
      from { background-position: 0 0; }
      to   { background-position: 60px 60px; }
    }

    /* ── Particles ── */
    @keyframes particleRise {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      5%   { opacity: 1; }
      95%  { opacity: 0.6; }
      100% { transform: translateY(-120px) scale(1.5); opacity: 0; }
    }
    .particle {
      position: fixed; border-radius: 50%; pointer-events: none; z-index: 1;
      animation: particleRise linear infinite;
    }

    /* ── Glow animations ── */
    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 18px rgba(124,106,255,0.45), 0 0 36px rgba(124,106,255,0.2); }
      50%       { box-shadow: 0 0 40px rgba(124,106,255,0.85), 0 0 80px rgba(124,106,255,0.4), 0 0 120px rgba(124,106,255,0.15); }
    }
    @keyframes glowPulsePink {
      0%, 100% { box-shadow: 0 0 18px rgba(255,106,176,0.45), 0 0 36px rgba(255,106,176,0.2); }
      50%       { box-shadow: 0 0 40px rgba(255,106,176,0.85), 0 0 80px rgba(255,106,176,0.4); }
    }
    @keyframes enterGlow {
      0%, 100% {
        box-shadow: 0 0 24px rgba(124,106,255,0.6), 0 0 60px rgba(255,106,176,0.3);
        transform: scale(1);
      }
      50% {
        box-shadow: 0 0 50px rgba(124,106,255,0.9), 0 0 100px rgba(255,106,176,0.5);
        transform: scale(1.02);
      }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes toastIn {
      0%   { opacity: 0; transform: translateX(110%); }
      12%  { opacity: 1; transform: translateX(0); }
      88%  { opacity: 1; transform: translateX(0); }
      100% { opacity: 0; transform: translateX(110%); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes checkPop {
      0%   { transform: scale(0) rotate(-30deg); opacity: 0; }
      70%  { transform: scale(1.2) rotate(5deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    /* ── Utility ── */
    .glow-purple  { animation: glowPulse 2.2s ease-in-out infinite; }
    .glow-pink    { animation: glowPulsePink 2.2s ease-in-out infinite; }
    .float-anim   { animation: float 3.5s ease-in-out infinite; }
    .fade-up      { animation: fadeUp 0.55s ease-out both; }

    .gradient-text {
      background: linear-gradient(135deg, #7c6aff 0%, #ff6ab0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .neon-purple {
      color: #7c6aff;
      text-shadow: 0 0 12px rgba(124,106,255,0.8), 0 0 24px rgba(124,106,255,0.4);
    }
    .neon-pink {
      color: #ff6ab0;
      text-shadow: 0 0 12px rgba(255,106,176,0.8), 0 0 24px rgba(255,106,176,0.4);
    }

    /* ── Buttons ── */
    .btn-primary {
      background: linear-gradient(135deg, #7c6aff, #9d5eff);
      color: #fff; border: none; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      font-family: 'Space Grotesk', sans-serif; font-weight: 600;
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(124,106,255,0.5);
    }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-cta {
      background: linear-gradient(135deg, #7c6aff 0%, #c850c0 50%, #ff6ab0 100%);
      background-size: 200% 200%;
      color: #fff; border: none; cursor: pointer;
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      letter-spacing: 3px;
      animation: enterGlow 2.4s ease-in-out infinite;
      transition: transform 0.2s;
    }
    .btn-cta:hover { transform: translateY(-3px); }

    /* ── Cards ── */
    .mission-card {
      transition: transform 0.25s, box-shadow 0.25s;
      cursor: pointer;
    }
    .mission-card:hover { transform: translateY(-5px); }
    .mission-card.readonly { cursor: default; }
    .mission-card.readonly:hover { transform: none; }

    .prize-card { transition: transform 0.3s, box-shadow 0.3s; }
    .prize-card:hover { transform: translateY(-7px); }

    /* ── Accordion ── */
    .acc-body {
      overflow: hidden;
      transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
    }

    /* ── Modal backdrop ── */
    .modal-bg {
      background: rgba(5,5,10,0.82);
      backdrop-filter: blur(10px);
    }

    /* ── Toast ── */
    .toast { animation: toastIn 5.5s ease-in-out forwards; }

    /* ── Progress bar ── */
    .prog-fill { transition: width 0.55s cubic-bezier(0.4,0,0.2,1); }

    /* ── Scan line overlay ── */
    .scanlines {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent, transparent 3px,
        rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px
      );
    }
  </style>

    /* ════════════════════════════════════════════
       COUNTDOWN TIMER
    ════════════════════════════════════════════ */
    function Countdown({ targetDate, label }) {
      const [t, setT] = useState(null);

      useEffect(() => {
        const tick = () => {
          const diff = targetDate - Date.now();
          if (diff <= 0) { setT({ done: true }); return; }
          const s = Math.floor(diff / 1000);
          setT({
            days:    Math.floor(s / 86400),
            hours:   Math.floor((s % 86400) / 3600),
            minutes: Math.floor((s % 3600) / 60),
            seconds: s % 60,
            live:    diff < 86400000,
          });
        };
        tick();
        const id = setInterval(tick, 1000);
        return () => clearInterval(id);
      }, [targetDate]);

      if (!t || t.done) return null;
      const pad = n => String(n).padStart(2, '0');

      return (
        <div className="flex flex-col items-center gap-4">
          <p style={{ color:'#555', fontSize:'11px', letterSpacing:'3px' }}>{label}</p>
          {t.live ? (
            <div className="flex items-center gap-1 font-mono text-5xl font-bold">
              <span className="neon-purple">{pad(t.hours)}</span>
              <span style={{ color:'rgba(124,106,255,0.5)' }}>:</span>
              <span className="neon-purple">{pad(t.minutes)}</span>
              <span style={{ color:'rgba(124,106,255,0.5)' }}>:</span>
              <span className="neon-pink">{pad(t.seconds)}</span>
            </div>
          ) : (
            <div className="flex items-end gap-3 flex-wrap justify-center">
              {[['DAYS',t.days],['HRS',t.hours],['MIN',t.minutes],['SEC',t.seconds]].map(([lbl,val]) => (
                <div key={lbl} className="text-center">
                  <div className="font-mono font-bold text-4xl rounded-xl px-5 py-3 min-w-[72px]"
                       style={{ background:'rgba(124,106,255,0.08)', border:'1px solid rgba(124,106,255,0.22)' }}>
                    <span className="neon-purple">{pad(val)}</span>
                  </div>
                  <p className="mt-2 text-xs tracking-widest" style={{ color:'#444' }}>{lbl}</p>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

        if (!form.email.trim()) e.email = 'Email is required';
        else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = 'Enter a valid email';

        return e;

        e.preventDefault();

        if (Object.keys(v).length) { setErrs(v); return; }

                  <CheckIcon size={30} style={{ color:'#22c55e' }} />
                </div>
                <h3 className="text-2xl font-bold text-white mb-2">You're entered!</h3>
                <p style={{ color:'#22c55e', fontSize:'15px' }}>Good luck. 🍀</p>
              </div>
            ) : (
              <>
                <h3 className="text-2xl font-bold text-white mb-1">Free Entry</h3>
                <p className="mb-7" style={{ color:'#777', fontSize:'13px' }}>
                  No missions required. Free entry receives 1 draw entry.
                </p>

                <form onSubmit={submit} noValidate>
                  <div className="mb-4">
                    <input type="text" placeholder="Your name" value={form.name}
                           onChange={e => { setForm(f=>({...f,name:e.target.value})); setErrs(v=>({...v,name:''})); }}
                           style={fieldStyle('name')} />
                    {errs.name && <p style={{ color:'#ef4444', fontSize:'12px', marginTop:'4px' }}>{errs.name}</p>}
                  </div>

                  <div className="mb-4">
                    <input type="email" placeholder="Your email" value={form.email}
                           onChange={e => { setForm(f=>({...f,email:e.target.value})); setErrs(v=>({...v,email:''})); }}
                           style={fieldStyle('email')} />
                    {errs.email && <p style={{ color:'#ef4444', fontSize:'12px', marginTop:'4px' }}>{errs.email}</p>}
                  </div>

                  <div className="mb-7">
                    <label className="flex gap-3 cursor-pointer" style={{ alignItems:'flex-start' }}>
                      <input type="checkbox" checked={form.agreed}
                             onChange={e => { setForm(f=>({...f,agreed:e.target.checked})); setErrs(v=>({...v,agreed:''})); }}
                             style={{ accentColor:'#7c6aff', marginTop:'2px', flexShrink:0 }} />
                      <span style={{ color:'#888', fontSize:'12px', lineHeight:'1.7' }}>
                        I agree to the{' '}
                        <a href="#official-rules" onClick={goRules}
                           style={{ color:'#7c6aff', textDecoration:'underline' }}>Official Rules</a>
                        {' '}and confirm I am 18 years of age or older and a legal resident of the United States.
                      </span>
                    </label>
                    {errs.agreed && <p style={{ color:'#ef4444', fontSize:'12px', marginTop:'4px' }}>{errs.agreed}</p>}
                  </div>

                  <button type="submit" className="btn-primary rounded-xl py-3 w-full font-semibold"
                          style={{ fontSize:'15px', letterSpacing:'1px' }}>
                    Submit Entry
                  </button>
                </form>
              </>
            )}
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════
       AMOE SECTION
    ════════════════════════════════════════════ */
    function AMOESection({ campaignStatus, onScrollToRules }) {
      const [open, setOpen] = useState(false);
      if (campaignStatus === 'drawing' || campaignStatus === 'ended') return null;

      return (
        <>
          <div className="relative z-10 text-center py-4 px-6">
            <p style={{ color:'#3a3a4a', fontSize:'13px' }}>
              Prefer not to complete missions? You can still enter the draw.
            </p>
            <button onClick={() => setOpen(true)}
                    style={{ color:'#4a4a5e', fontSize:'13px', textDecoration:'underline',
                             background:'none', border:'none', cursor:'pointer', marginTop:'3px' }}
                    onMouseEnter={e => e.target.style.color='#666'}
                    onMouseLeave={e => e.target.style.color='#4a4a5e'}>
              Enter without missions →
            </button>
          </div>
          {open && <AMOEModal onClose={() => setOpen(false)} onScrollToRules={onScrollToRules} />}
        </>
      );
    }

    /* ════════════════════════════════════════════
       OFFICIAL RULES
    ════════════════════════════════════════════ */
    function AccordionItem({ title, body, open, onToggle }) {
      return (
        <div style={{ borderBottom:'1px solid rgba(30,30,48,0.9)' }}>
          <button onClick={onToggle}
                  className="w-full flex items-center justify-between py-4 px-1 text-left transition-colors"
                  style={{ background:'none', border:'none', cursor:'pointer',
                           color: open ? '#d8d8e8' : '#666' }}>
            <span style={{ fontWeight:600, fontSize:'14px' }}>{title}</span>
            <span style={{ transform: open ? 'rotate(180deg)' : 'rotate(0)', transition:'transform 0.3s ease',
                           flexShrink:0, marginLeft:'12px' }}>
              <ChevronIcon size={15} style={{ color:'#7c6aff' }} />
            </span>
          </button>
          <div className="acc-body"
               style={{ maxHeight: open ? '800px' : '0', opacity: open ? 1 : 0 }}>
            <p className="pb-5 px-1 text-sm leading-relaxed" style={{ color:'#5a5a6e' }}>{body}</p>
          </div>
        </div>
      );
    }

    function OfficialRules({ sectionRef }) {
      const [lang, setLang] = useState('en');
      const [opened, setOpened] = useState(new Set([1]));

      const toggle = (id) => setOpened(prev => {
        const s = new Set(prev);
        s.has(id) ? s.delete(id) : s.add(id);
        return s;
      });

      const rules = RULES[lang];

      return (
        <section ref={sectionRef} id="official-rules" className="relative z-10 px-6 py-24">
          <div className="max-w-3xl mx-auto">

            {/* header + lang switcher */}
            <div className="mb-8">
              <p className="text-xs font-bold tracking-widest mb-2" style={{ color:'#7c6aff' }}>LEGAL</p>
              <h2 className="text-5xl font-bold text-white">Official Rules</h2>
            </div>

            {/* NO PURCHASE banner — always outside accordion */}
            <div className="mb-6 px-5 py-4 rounded-xl text-center font-bold text-sm"
                 style={{ background:'rgba(220,38,38,0.12)', border:'1px solid rgba(220,38,38,0.35)', color:'#f87171' }}>
              NO PURCHASE NECESSARY TO ENTER OR WIN.
              Open to U.S. residents 18+ only. Void where prohibited.
            </div>

            {/* accordion */}
            <div className="rounded-2xl overflow-hidden px-5"
                 style={{ background:'rgba(13,13,22,0.95)', border:'1px solid rgba(28,28,46,0.9)' }}>
              {rules.map(r => (
                <AccordionItem key={r.id} title={`${r.id}. ${r.title}`}
                               body={r.body} open={opened.has(r.id)}
                               onToggle={() => toggle(r.id)} />
              ))}
            </div>

          </div>
        </section>
      );
    }

    /* ════════════════════════════════════════════
       FOOTER
    ════════════════════════════════════════════ */
    function Footer({ onScrollToRules }) {
      return (
        <footer className="relative z-10 px-6 py-14 text-center"
                style={{ borderTop:'1px solid rgba(28,28,46,0.8)' }}>
          <div className="mb-6">
            <span className="font-bold text-4xl" style={{ fontFamily:'Rajdhani,sans-serif' }}>
              <span className="text-white">VI</span>
              <span style={{ color:'#7c6aff' }}>VERSE</span>
            </span>
          </div>
          <div className="flex items-center justify-center gap-5 mb-6">
            <button onClick={onScrollToRules}
                    style={{ color:'#444', background:'none', border:'none', cursor:'pointer', fontSize:'13px',
                             transition:'color 0.2s' }}
                    onMouseEnter={e=>e.target.style.color='#888'}
                    onMouseLeave={e=>e.target.style.color='#444'}>
              Official Rules
            </button>
            <span style={{ color:'#2a2a3a' }}>|</span>
            <a href="#" style={{ color:'#444', textDecoration:'none', fontSize:'13px', transition:'color 0.2s' }}
               onMouseEnter={e=>e.target.style.color='#888'}
               onMouseLeave={e=>e.target.style.color='#444'}>
              Privacy Policy
            </a>
          </div>
          <p style={{ color:'#2a2a3a', fontSize:'12px' }}>© 2025 VIVERSE. All rights reserved.</p>
        </footer>
      );
    }

    /* ════════════════════════════════════════════
       DIVIDER
    ════════════════════════════════════════════ */
    function Divider() {
      return (
        <div className="relative z-10 max-w-3xl mx-auto px-6">
          <div style={{ height:'1px', background:'linear-gradient(90deg,transparent,rgba(124,106,255,0.2),transparent)' }} />
        </div>
      );
    }

    /* ════════════════════════════════════════════
       APP ROOT
    ════════════════════════════════════════════ */
    function App() {
      const [status, setStatus]       = useState(CFG.status);
      const [geoAlert, setGeoAlert]   = useState(false);
      const [toast, setToast]         = useState({ show:false, msg:'' });
      const missionRef = useRef(null);
      const rulesRef   = useRef(null);

      /* geo detection */
      useEffect(() => {
        try {
          const tz   = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
          const lang = (navigator.language || '').toLowerCase();
          const inUS = tz.startsWith('America/') || lang === 'en-us' || lang.startsWith('en-us');
          if (!inUS) setGeoAlert(true);
        } catch (_) {}
      }, []);

      /* status polling — every 5 min */
      useEffect(() => {
        const check = () => {
          const now = Date.now();
          // In production replace with: fetch('/api/campaign/status').then(...)
          let next = CFG.status;
          if (now < CFG.startDate.getTime()) next = 'coming_soon';
          else if (now > CFG.endDate.getTime()) next = 'drawing';

          if (next !== status) {
            if (next === 'drawing' && status === 'active') {
              setToast({
                show: true,
                msg: `The campaign has ended! We're now selecting winners. Results will be announced on ${CFG.winnerAnnouncementDate}.`,
              });
              setTimeout(() => setToast({ show:false, msg:'' }), 6000);
            }
            setStatus(next);
          }
        };
        check();
        const id = setInterval(check, 5 * 60 * 1000);
        return () => clearInterval(id);
      }, [status]);

      const scrollTo = (ref) => ref.current?.scrollIntoView({ behavior:'smooth', block:'start' });

      return (
        <div style={{ background:'#0a0a0f', minHeight:'100vh', position:'relative' }}>
          <Particles />

          {geoAlert && <GeoAlertBanner onDismiss={() => setGeoAlert(false)} />}
          <Toast message={toast.msg} visible={toast.show} />

          <Hero status={status} onStart={() => scrollTo(missionRef)} />
          <Divider />
          <MissionBoard campaignStatus={status} sectionRef={missionRef} />
          <Divider />
          <PrizeShowcase />
          <Divider />
          <AMOESection campaignStatus={status} onScrollToRules={() => scrollTo(rulesRef)} />
          <Divider />
          <OfficialRules sectionRef={rulesRef} />
          <Footer onScrollToRules={() => scrollTo(rulesRef)} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
